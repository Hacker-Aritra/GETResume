<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — ResumeForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html"><div class="brand"><span class="dot"></span> GETResume</div></a>
    <h2>Create your account</h2>
    <p class="sub">Start building a resume the AI helps you polish.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="full_name" placeholder="Aritra Basu" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
        <div class="field-hint">Use at least 6 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Create account</button>
    </form>

    <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
